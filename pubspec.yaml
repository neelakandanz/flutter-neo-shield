name: flutter_neo_shield
description: Client-side PII protection toolkit for Flutter. Secures sensitive data from logs and clipboard, protects memory, and obfuscates strings in binaries.
version: 0.2.1
homepage: https://github.com/neelakandanz/flutter-neo-shield
repository: https://github.com/neelakandanz/flutter-neo-shield
issue_tracker: https://github.com/neelakandanz/flutter-neo-shield/issues
topics:
  - security
  - privacy
  - pii
  - logging
  - obfuscation

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.9.0
  plugin_platform_interface: ^2.1.0
  source_gen: ^2.0.0
  build: '>=2.4.0 <4.0.0'
  analyzer: '>=7.0.0 <9.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  build_test: ^2.2.0

flutter:
  plugin:
    platforms:
      android:
        package: com.neelakandan.flutter_neo_shield
        pluginClass: FlutterNeoShieldPlugin
      ios:
        pluginClass: FlutterNeoShieldPlugin
